<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Logos - Reward</title>
    <link rel="stylesheet" href="index.css?v=1.1.0">
</head>

<body>
    <div class="kiosk-container">
        <header>
            <h1>Step 3. 라면 선택</h1>
            <p class="subtitle">수고하셨습니다! 선물을 골라주세요.</p>
        </header>

        <main>
            <div class="ramen-grid">
                <div class="ramen-item">
                    <img src="https://www.theguru.co.kr/data/photos/20230939/art_16957821882918_0df19b.png" alt="신라면">
                    <p style="font-weight: 600;">신라면</p>
                </div>
                <div class="ramen-item">
                    <img src="https://img.danawa.com/prod_img/500000/856/491/img/7491856_1.jpg?_v=20230712145019"
                        alt="안성탕면">
                    <p style="font-weight: 600;">안성탕면</p>
                </div>
                <div class="ramen-item">
                    <img src="https://asset.m-gs.kr/prod/1038147837/1/550" alt="너구리">
                    <p style="font-weight: 600;">너구리</p>
                </div>
                <div class="ramen-item">
                    <img src="https://lottemartzetta.com/images-v3/932dcbc7-fca8-4d43-bcde-f73d1ce3cc7d/2658958d-6d9d-4a91-b307-c4fea3467803/500x500.jpg"
                        alt="짜파게티">
                    <p style="font-weight: 600;">짜파게티</p>
                </div>
            </div>

            <div style="margin-top: 50px;">
                <button class="btn-primary" id="btn-finish">선택 완료 (Claim Reward)</button>
            </div>
        </main>

        <footer>
            <div class="progress-container">
                <div class="progress-bar" style="width: 100%;"></div>
            </div>
            <div class="step-indicator">
                <span>보상 선택</span>
                <span>100%</span>
            </div>
        </footer>
    </div>
    <script src="app.js?v=1.1.0"></script>
</body>

</html>
